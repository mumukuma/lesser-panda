<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- curled red panda tail: rust body with darker rings, dark tip -->
  <defs>
    <path id="tail" d="M28 16 C16 30 16 52 26 66 C34 78 52 84 70 80 C82 77 88 70 90 62" fill="none"/>
  </defs>
  <!-- soft taper: thicker at base, drawn as base body -->
  <use href="#tail" stroke="#b5552d" stroke-width="26" stroke-linecap="round"/>
  <!-- dark rings -->
  <use href="#tail" stroke="#7e2f12" stroke-width="27" stroke-linecap="butt"
       stroke-dasharray="11 17" stroke-dashoffset="0"/>
  <!-- dark fluffy tip -->
  <circle cx="90" cy="62" r="13.5" fill="#7e2f12"/>
  <circle cx="90" cy="62" r="13.5" fill="none"/>
</svg>
